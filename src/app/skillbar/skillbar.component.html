<div class="skillboard">
    @for (group of skillGroups; track group.title) {
        <section class="skill-group">
            <h3>{{ group.title }}</h3>

            <div class="skill-group__list">
                @for (skill of group.skills; track skill.name) {
                    <div class="skill-row">
                        <div class="skill-row__meta">
                            <span class="skill-row__name">{{ skill.name }}</span>
                            <span class="skill-row__label">{{ skill.label }}</span>
                        </div>

                        <div class="skill-row__track" aria-hidden="true">
                            <span class="skill-row__fill" [style.width.%]="skill.level"></span>
                        </div>
                    </div>
                }
            </div>
        </section>
    }
</div>
