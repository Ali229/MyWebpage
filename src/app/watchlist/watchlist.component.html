<app-saved-title-list
  title="Watchlist"
  backLabel="Back to movies"
  backTo="/movies"
  [titles]="auth.watchlist"
  [loaded]="auth.watchlistLoaded"
  [empty]="auth.empty"
  [moviesCount]="auth.moviesCount"
  [tvCount]="auth.tvCount"
  emptyMessage="Empty watchlist, add something to track."
  removeLabel="Remove from watchlist"
  removeIconClass="fas fa-bookmark fa-lg amber-text"
  secondaryActionLabel="Add to Lovelist"
  secondaryIconClass="fas fa-heart fa-lg"
  secondaryActiveIconClass="fas fa-heart fa-lg text-danger"
  [secondaryActiveIds]="auth.lovelistIds"
  (removeTitle)="remove($event)"
  (secondaryTitle)="moveToLovelist($event)">
</app-saved-title-list>
