<section class="settings-page">
  <header class="settings-header">
    <div class="settings-title-row">
      <h1>Streaming providers</h1>
      <span class="settings-pill">{{ selectedProvidersCount }} selected</span>
    </div>

    <button class="btn btn-dark app-back-button" id="target" routerLink="../movies" type="button">
        <i aria-hidden="true" class="fas fa-arrow-left"></i>
        <span>Back</span>
    </button>
  </header>

  @if (auth.settingsLoaded) {
    <section class="settings-panel settings-panel--primary">
      <div class="panel-heading">
        <div class="provider-actions">
          <button (click)="selectAllProviders()" class="panel-action" type="button">Select all</button>
          <button (click)="clearProviders()" class="panel-action panel-action--ghost" type="button">Clear all</button>
        </div>
      </div>

      <div class="provider-grid">
        @for (provider of auth.providers; track provider.id) {
          <label class="provider-card" [class.is-selected]="provider.selected" [for]="'provider-' + provider.id">
            <input
              [(ngModel)]="provider.selected"
              [id]="'provider-' + provider.id"
              [name]="'provider-' + provider.id"
              class="provider-card__checkbox"
              type="checkbox">

            <span class="provider-card__icon">
              <img [alt]="provider.name + ' icon'" [src]="provider.icon">
            </span>

            <span class="provider-card__content">
              <span class="provider-card__title">{{ provider.name }}</span>
            </span>

            <span class="provider-card__state">
              <i aria-hidden="true" [class]="provider.selected ? 'fas fa-check-circle' : 'far fa-circle'"></i>
            </span>
          </label>
        }
      </div>

      <div class="settings-footer">
        <button
          (click)="updateSettings()"
          [disabled]="!hasChanges || !auth.settingsLoaded"
          class="settings-save-button"
          type="button">
          Save changes
        </button>
      </div>
    </section>
  } @else {
    <div class="settings-loading" role="status">
      <div aria-hidden="true" class="spinner-border settings-loading__spinner"></div>
      <p>Loading your provider preferences...</p>
    </div>
  }
</section>
