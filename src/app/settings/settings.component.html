<section class="settings-page">
  <header class="settings-header">
    <div class="settings-title-row">
      <app-back-button [to]="'/movies'" ariaLabel="Back to movies"></app-back-button>
      <h1 class="subpage-title">Streaming providers</h1>
    </div>

    <div class="settings-header-actions">
      <app-user-profile></app-user-profile>
    </div>
  </header>

  @if (auth.settingsLoaded) {
    <section class="settings-panel settings-panel--primary">
      <div class="provider-grid">
        @for (provider of auth.providers; track provider.id) {
          <label class="provider-card" [class.is-selected]="provider.selected" [for]="'provider-' + provider.id">
            <input
              [(ngModel)]="provider.selected"
              [attr.aria-label]="provider.name"
              [id]="'provider-' + provider.id"
              [name]="'provider-' + provider.id"
              class="provider-card__checkbox"
              type="checkbox">

            <span class="provider-card__icon">
              <img [alt]="provider.name + ' icon'" [src]="provider.icon">
            </span>

            <span class="provider-card__content">
              <span class="provider-card__title">{{ provider.name }}</span>
            </span>

            <span class="provider-card__state">
              <i aria-hidden="true" [class]="provider.selected ? 'fas fa-check-circle' : 'far fa-circle'"></i>
            </span>
          </label>
        }
      </div>

      <div class="settings-footer">
        <button
          (click)="updateSettings()"
          [disabled]="!hasChanges || !auth.settingsLoaded"
          class="settings-save-button"
          type="button">
          Save changes
        </button>
      </div>
    </section>
  } @else {
    <app-page-loader [minHeight]="'360px'" [spinnerSize]="'4.5rem'"></app-page-loader>
  }
</section>
