<div id="target"></div>
@if (isPhone) {
  <div class="mobile-movies-header">
    <h1 class="mobile-page-title"><b>Movies</b></h1>
    <app-user-profile class="mobile-user-profile"></app-user-profile>
  </div>
}
<form>
  <div class="row mb-4 search-row">
    <div class="col">
      <div class="input-group">
        <div class="input-group-prepend">
          <select [(ngModel)]="ts.selectedOption" class="browser-default custom-select" name="sel">
            <option value="">All</option>
            <option value="movie">Movie</option>
            <option value="tv">TV</option>
          </select>
        </div>
        <input #searchInput [(ngModel)]="ts.title"
          aria-label="Search for movies or TV shows" class="form-control" name="movname"
          placeholder="Search for movies or TV shows" type="text">
          <input [(ngModel)]="ts.year" aria-describedby="button-addon2" aria-label="Year"
            class="form-control col-md-2"
            name="movyear" placeholder="Year" type="text">
          <div class="input-group-append">
            <button (click)="ts.multiSearch()" [disabled]="!ts.title" class="btn btn-outline-dark m-0 px-3 py-2"
              id="button-addon2" type="submit"> Search
            </button>
          </div>
        </div>
      </div>
      @if (!isPhone) {
        <div class="col-auto ml-auto not-phone-user">
          <app-user-profile></app-user-profile>
        </div>
      }
    </div>
  </form>
  <app-title></app-title>
  <div class="pop">
    <h2><b><span style="font-size: 130%;color: #3F729B;">|</span> Popular</b></h2>
    @if (showStreamableCheckBox) {
      <h5 class="streamable" title="Set any streaming services you have in settings">
        <input [(ngModel)]="auth.bShowStreamableOnly" (ngModelChange)="auth.saveStreamableOnlySetting(auth.bShowStreamableOnly)"  class="checkbox"
        type="checkbox"> Streamable</h5>
      }
    </div>
    <app-popular></app-popular>
