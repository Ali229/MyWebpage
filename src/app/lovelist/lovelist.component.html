<app-saved-title-list
  title="Lovelist"
  backLabel="Back to movies"
  backTo="/movies"
  [titles]="auth.lovelist"
  [loaded]="auth.lovelistLoaded"
  [empty]="auth.lovelistEmpty"
  [moviesCount]="auth.lovelistMoviesCount"
  [tvCount]="auth.lovelistTvCount"
  emptyMessage="Empty lovelist, add something you love."
  removeLabel="Remove from lovelist"
  removeIconClass="fas fa-heart fa-lg text-danger"
  secondaryActionLabel="Add to Watchlist"
  secondaryIconClass="fas fa-bookmark fa-lg"
  secondaryActiveIconClass="fas fa-bookmark fa-lg amber-text"
  [secondaryActiveIds]="auth.watchlistIds"
  (removeTitle)="remove($event)"
  (secondaryTitle)="moveToWatchlist($event)">
</app-saved-title-list>
