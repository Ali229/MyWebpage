<section class="projects-page">
    <h1>Projects</h1>

    <div class="projects-grid">
        @for (project of projects; track project.title) {
            <article class="project-card">
                @if (project.image) {
                    <div class="project-card__media" [class.project-card__media--contain]="project.imageFit === 'contain'">
                        <img
                            [alt]="project.imageAlt || project.title"
                            [src]="project.image"
                            decoding="async"
                            loading="lazy">
                    </div>
                }

                <div class="project-card__content">
                    <p class="project-card__stack">{{ project.stack }}</p>
                    <h2>{{ project.title }}</h2>
                    <p class="project-card__description">{{ project.description }}</p>

                    @if (project.link) {
                        <a [href]="project.link" class="project-card__link" rel="noopener noreferrer" target="_blank">
                            {{ project.linkLabel || 'View project' }}
                        </a>
                    }
                </div>
            </article>
        }
    </div>
</section>
